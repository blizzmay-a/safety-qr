<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Square | Safety QR</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #ffffff; color: #333; }
        .card { width: 85%; max-width: 400px; text-align: center; border: 1px solid #eee; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .info-box { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 12px; text-align: left; display: none; }
        .label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; margin-bottom: 3px; font-weight: 600; }
        .value { font-size: 1.05rem; font-weight: 500; color: #000; }
    </style>
</head>
<body>
    <div class="card">
        <div id="box-n" class="info-box"><div class="label">Name</div><div id="v-n" class="value"></div></div>
        <div id="box-s" class="info-box"><div class="label">SNS</div><div id="v-s" class="value"></div></div>
        <div id="box-i" class="info-box"><div class="label">ID</div><div id="v-i" class="value"></div></div>
        <div id="box-e" class="info-box"><div class="label">Mail</div><div id="v-e" class="value"></div></div>
        <div id="box-p" class="info-box"><div class="label">Phone</div><div id="v-p" class="value"></div></div>
    </div>
    <script src="view.js"></script>
</body>
</html>
